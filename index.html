<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Urlaubsplaner</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --bg2:#eef3f9;
      --card:#ffffff;
      --cardStrong:#ffffff;
      --surface:#f8fbff;
      --surface2:#f6f8fc;
      --stroke:#dbe4ef;
      --stroke2:#c8d4e3;
      --text:#1f2937;
      --muted:#748092;
      --accent:#5b8def;
      --accentSoft:rgba(91,141,239,.12);
      --accentStrong:#4f7fe0;
      --accentText:#f8fbff;
      --inkSoft:rgba(31,41,55,.05);
      --shadow:0 10px 30px rgba(31,41,55,.06);
      --shadow2:0 6px 18px rgba(31,41,55,.05);
      --weekendBg:#f7f9fc;
      --holidayBg:#fee2e2;
      --holidaySt:#fecaca;
      --bridgeBg:#dbeafe;
      --bridgeSt:#bfdbfe;
      --vacBg:#dcfce7;
      --vacSt:#bbf7d0;
      --previewBg:rgba(15,98,254,.12);
      --previewSt:rgba(15,98,254,.24);
      --schoolBg:#fef3c7;
      --schoolSt:#fde68a;
      --focus:rgba(15,98,254,.12);
      --focusSt:rgba(15,98,254,.26);
      --toastBg:#111827;
      --toastText:#f9fafb;
      --toastBorder:rgba(255,255,255,.08);
      --tooltipBg:#0f172a;
      --tooltipText:#f8fafc;
      --neg:#dc2626;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x:hidden;
    }
    .container {
        max-width: 1720px;
        margin: 18px auto 24px;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 496px minmax(0, 1fr);
        gap: 16px;
        align-items: start;
        width: 100%;
        animation: pageIn .55s cubic-bezier(.22,1,.36,1);
    }
    @media (max-width: 1100px){
      .container{ grid-template-columns: 1fr; }
    }
    @media (max-width: 640px){
      .container{
        margin: 12px auto 24px;
        padding: 0 12px;
      }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow:visible;
      min-width:0;
      position: sticky;
      top: 16px;
      animation: panelIn .5s cubic-bezier(.22,1,.36,1);
    }
    @media (max-width: 1100px){
      .card{ position: static; }
    }

    .cardHeader{
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--stroke);
      background: var(--cardStrong);
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap: 4px;
      min-width:0;
    }
    .eyebrow{
      display:none;
    }
    .title .t{
      font-size: 20px;
      font-weight: 650;
      letter-spacing:-.03em;
      line-height:1;
      max-width:none;
    }
    .title .s{
      display:none;
    }

    .cardBody{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      min-width:0;
    }

    .controlsPanel{
      display:grid;
      gap:10px;
      padding:12px;
      border:1px solid var(--stroke);
      border-radius:8px;
      background:linear-gradient(180deg, rgba(248,251,255,.9), rgba(255,255,255,.95));
    }
    .controlsRow{
      display:grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 10px;
      min-width:0;
    }
    @media (max-width: 640px){
      .controlsRow{ grid-template-columns: 1fr; }
    }

    label{
      display:flex;
      flex-direction:column;
      gap: 7px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight:650;
      letter-spacing:.01em;
      min-width:0;
    }

    select, input[type="number"], input[type="text"]{
      appearance:none;
      outline:none;
      border: 1px solid var(--stroke);
      background: #ffffff;
      color: var(--text);
      border-radius: 9px;
      padding: 11px 12px;
      font-size: 13px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      transition: border-color .12s ease, box-shadow .12s ease;
      min-width:0;
      width:100%;
    }
    select:focus, input[type="number"]:focus, input[type="text"]:focus{
      border-color: var(--focusSt);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .row2{
      display:grid;
      grid-template-columns: minmax(0, 1fr) 126px;
      gap: 10px;
      min-width:0;
    }
    #stateSelect{
      font-size:12.5px;
      padding-right:34px;
    }

    .dashboard{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      min-width:0;
    }
    @media (max-width: 760px){
      .dashboard{ grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px){
      .dashboard{ grid-template-columns: 1fr; }
    }

    .tile{
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--stroke);
      background: #ffffff;
      box-shadow: none;
      min-height: 76px;
      min-width:0;
      overflow:hidden;
    }
    .tile .k{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tile .v{
      font-weight: 650;
      font-size: 23px;
      margin-top: 4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tile .s{
      color: var(--muted);
      font-size: 11.5px;
      margin-top: 2px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tile .v.neg{
      color: var(--neg);
    }

    .togglesRow{
      display:grid;
      gap: 12px;
      padding: 4px 0 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      min-width:0;
    }

    .toggle{
      display:flex;
      align-items:center;
      flex-direction: row-reverse;
      justify-content:space-between;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: #ffffff;
      cursor:pointer;
      user-select:none;
      min-width:0;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .toggle:hover{
      border-color: rgba(91,141,239,.45);
      box-shadow: 0 10px 24px rgba(91,141,239,.08);
    }
    .toggle input{
      appearance:none;
      -webkit-appearance:none;
      position:relative;
      width:52px;
      height:30px;
      margin:0;
      border-radius:999px;
      border:1px solid #cfd8e6;
      background:#e8edf4;
      cursor:pointer;
      transition: background .18s ease, border-color .18s ease;
      flex:0 0 auto;
    }
    .toggle input::after{
      content:"";
      position:absolute;
      top:3px;
      left:3px;
      width:22px;
      height:22px;
      border-radius:999px;
      background:#ffffff;
      box-shadow:0 1px 3px rgba(15,23,42,.18);
      transition: transform .18s ease;
    }
    .toggle input:checked{
      background:var(--accent);
      border-color:var(--accentStrong);
    }
    .toggle input:checked::after{
      transform:translateX(22px);
    }
    .toggle input:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .toggle .m{
      font-size: 14px;
      font-weight: 520;
      color: var(--text);
      line-height:1.1;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      flex:1 1 auto;
    }

    .hint{
      display:none;
    }
    .listCard{
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background:transparent;
      box-shadow: none;
      overflow:visible;
      min-width:0;
    }
    .listTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 11px 12px;
      border-bottom: 1px solid var(--stroke);
      background:transparent;
      min-width:0;
    }
    .listTop .h{
      font-size: 12px;
      font-weight: 720;
      color: var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .copyBtn{
      border: 1px solid var(--stroke);
      background: #ffffff;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 700;
      cursor:pointer;
      transition: background .12s ease, border-color .12s ease, transform .06s ease, opacity .12s ease;
      box-shadow: none;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .copyBtn:hover{
      border-color: var(--stroke2);
      background: #f8fafc;
    }
    .copyBtn:active{ transform: translateY(1px); }
    .copyBtn:disabled{ opacity:.55; cursor:not-allowed; }
    .copyBtn svg{
      width: 16px;
      height: 16px;
      stroke: #0f172a;
      stroke-width: 2.2;
      fill:none;
    }

    .tableWrap{
      max-height: none;
      overflow-x: hidden;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
    }
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      font-size: 11.5px;
      table-layout: auto;
    }
    thead th{
      position: sticky;
      top: 0;
      background: #ffffff;
      z-index: 2;
      color: var(--muted);
      text-align:left;
      font-weight: 900;
      padding: 8px 10px;
      border-bottom: 1px solid var(--stroke);
      white-space:nowrap;
    }
    tbody td{
      padding: 8px 10px;
      border-bottom: 1px solid var(--stroke);
      white-space:nowrap;
      overflow:visible;
      text-overflow:ellipsis;
      max-width: none;
    }
    tbody tr:last-child td{ border-bottom:none; }
    .empty{
      padding: 10px 12px;
      color: var(--muted);
      font-size: 11.5px;
    }

    .rowTrashCell{
      width: 56px;
      max-width: 56px;
      min-width: 56px;
      padding-right: 10px;
      overflow: visible;
      text-overflow:clip;
      white-space:nowrap;
    }
    #rangesTable th:last-child{
      width: 56px;
    }
    .rowTrashBtn{
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--stroke);
      background: #ffffff;
      box-shadow: var(--shadow2);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: background .12s ease, border-color .12s ease, transform .06s ease, opacity .12s ease;
      padding:0;
    }
    .rowTrashBtn:hover{
      border-color: var(--stroke2);
      background: #f8fafc;
    }
    .rowTrashBtn:active{ transform: translateY(1px); }
    .rowTrashBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .rowTrashBtn svg{
      width: 16px;
      height: 16px;
      stroke: #0f172a;
      stroke-width: 2.2;
      fill:none;
    }

    .calendarCard{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow:visible;
      min-width:0;
      width:100%;
      animation: panelIn .62s cubic-bezier(.22,1,.36,1);
    }

    .calTop{
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--stroke);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      flex-wrap:wrap;
      min-width:0;
      background: #ffffff;
      border-top-left-radius:10px;
      border-top-right-radius:10px;
    }
    .calTop .left{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 220px;
      max-width: 100%;
    }
    .calTop .year{
      font-size: 22px;
      font-weight: 650;
      letter-spacing:-.03em;
    }
    .calTop .meta{
      color: var(--muted);
      font-size: 11.5px;
      line-height:1.25;
      max-width: 100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .calRight{
      display:flex;
      align-items:center;
      gap: 8px;
      justify-content:flex-end;
      margin-left:auto;
      min-width:0;
    }

    .iconBtns{
      display:flex;
      gap: 8px;
      align-items:center;
    }
    .iconBtn{
      width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--stroke);
      background: #ffffff;
      box-shadow: none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: background .12s ease, border-color .12s ease, transform .06s ease, opacity .12s ease;
      padding:0;
    }
    .iconBtn:hover{
      border-color: var(--stroke2);
      background: #f8fafc;
    }
    .iconBtn:active{ transform: translateY(1px); }
    .iconBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .iconBtn svg{
      width: 18px;
      height: 18px;
      stroke: #0f172a;
      stroke-width: 2.2;
      fill: none;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
      justify-content:flex-end;
      width:100%;
      margin-top: 8px;
      min-width:0;
    }
    .legend .lg{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #ffffff;
      color: var(--muted);
      font-size: 11px;
      user-select:none;
      white-space:nowrap;
    }
    .sectionIcon{
      width:16px;
      height:16px;
      stroke: currentColor;
      stroke-width:1.8;
      fill:none;
      flex:0 0 auto;
    }
    .listTop .h{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .sw{
      width: 10px;
      height: 10px;
      border-radius: 2px;
      border: 1px solid rgba(15,23,42,.10);
      background: #ffffff;
    }
    .sw.w{ background: var(--weekendBg); }
    .sw.h{ background: var(--holidayBg); border-color: var(--holidaySt); }
    .sw.b{ background: var(--bridgeBg); border-color: var(--bridgeSt); }
    .sw.v{ background: var(--vacBg); border-color: var(--vacSt); }
    .sw.p{ background: var(--previewBg); border-color: var(--previewSt); }
    .sw.f{ background: var(--schoolBg); border-color: var(--schoolSt); }

    .months{
      padding: 14px;
      display:grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 14px;
      width:100%;
      min-width:0;
    }
    @media (max-width: 1280px){
      .months{ grid-template-columns: 1fr; }
    }
    @media (max-width: 860px){
      .months{ grid-template-columns: 1fr; }
    }

    .month{
      border: 1px solid var(--stroke);
      background: #ffffff;
      border-radius: 6px;
      overflow:hidden;
      box-shadow: none;
      min-width:0;
      animation: monthIn .45s cubic-bezier(.22,1,.36,1);
    }

    .monthTop{
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--stroke);
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap: 10px;
      background: #ffffff;
      min-width:0;
    }
    .monthTop .name{
      font-weight: 650;
      font-size: 15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .monthTop .hintSmall{
      color: var(--muted);
      font-size: 11.5px;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      padding: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing:.2px;
      user-select:none;
      min-width:0;
    }
    .dow div{
      padding: 14px 8px;
      text-align:center;
      font-weight:700;
      border-right: 1px solid var(--stroke);
      border-bottom: 1px solid var(--stroke);
    }
    .dow div:last-child{
      border-right: 0;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      padding: 0;
      min-width:0;
    }

    .cell{
      height: 52px;
      border-radius: 0;
      border-right: 1px solid var(--stroke);
      border-bottom: 1px solid var(--stroke);
      border-top: 0;
      border-left: 0;
      background: #ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      cursor:pointer;
      user-select:none;
      transition: background .10s ease, border-color .10s ease, transform .06s ease;
      overflow:hidden;
      min-width: 0;
    }
    .grid .cell:nth-child(7n){
      border-right: 0;
    }
    .cell:hover{
      background: #f9fbff;
    }
    .cell:active{ transform: translateY(1px); }

    .cell.muted{
      cursor:default;
      opacity:.35;
      background: #fcfdff;
    }
    .cell.muted:hover{ background:#fcfdff; transform:none; }

    .cell .d{
      font-size: 14px;
      font-weight: 720;
      z-index:2;
    }

    .cell.weekend{ background: var(--weekendBg); }
    .cell.holiday{ background: var(--holidayBg); border-color: var(--holidaySt); }
    .cell.bridge{ background: var(--bridgeBg); border-color: var(--bridgeSt); }
    .cell.school{ background: var(--schoolBg); border-color: var(--schoolSt); }
    .cell.vac{ background: var(--vacBg); border-color: var(--vacSt); }
    .cell.preview{ background: var(--previewBg); border-color: var(--previewSt); }

    .cell.school.vac{ background: var(--vacBg); border-color: var(--vacSt); }
    .cell.school.preview{
      background: linear-gradient(0deg, rgba(34,197,94,.14), rgba(34,197,94,.14)), var(--schoolBg);
      border-color: var(--previewSt);
    }

    .toasts{
      position: fixed;
      right: 12px;
      bottom: 12px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      z-index: 10020;
      pointer-events:none;
      max-width: min(360px, calc(100vw - 24px));
    }
    .toast{
      pointer-events:none;
      background: var(--toastBg);
      color: var(--toastText);
      border: 1px solid var(--toastBorder);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(15,23,42,.34);
      padding: 12px 13px;
      display:flex;
      gap: 10px;
      align-items:flex-start;
      opacity: 0;
      transform: translateY(8px);
      animation: toastIn .18s ease-out forwards;
      overflow:visible;
    }
    .toast .icon{
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      margin-top: 1px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .toast .icon svg{
      width: 13px;
      height: 13px;
      stroke: var(--toastText);
      stroke-width: 2.2;
      fill:none;
    }
    .toast .msg{
      font-size: 12.5px;
      line-height: 1.4;
      white-space:normal;
      min-width:0;
    }
    .toast.out{
      animation: toastOut .16s ease-in forwards;
    }
    @keyframes toastIn{
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut{
      to { opacity: 0; transform: translateY(8px); }
    }
    .tooltipLayer{
      position: fixed;
      inset: 0;
      pointer-events:none;
      z-index: 10030;
    }
    .tooltipBubble{
      position: fixed;
      max-width: min(280px, calc(100vw - 20px));
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--tooltipBg);
      color: var(--tooltipText);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 44px rgba(15,23,42,.32);
      font-size: 11.5px;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .12s ease, transform .12s ease;
    }
    .tooltipBubble.visible{
      opacity: 1;
      transform: translateY(0);
    }
    .tooltipBubble::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-5px;
      width:10px;
      height:10px;
      background: var(--tooltipBg);
      border-right:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
      transform: translateX(-50%) rotate(45deg);
    }

    #rangesTable th:nth-child(1){
      width: 38px;
      padding-left: 10px;
      padding-right: 8px;
    }
    #rangesTable td:nth-child(1){
      width: 38px;
      padding-left: 10px;
      padding-right: 8px;
      text-align: right;
    }

    #rangesTable th:nth-child(4),
    #rangesTable td:nth-child(4){
      width: 64px;
      text-align: right;
    }

    #rangesTable th:nth-child(2),
    #rangesTable th:nth-child(3){
      width: 132px;
    }

    #rangesTable td:nth-child(2),
    #rangesTable td:nth-child(3){
      overflow: visible;
      text-overflow: clip;
      max-width: none;
    }
    .suggestionsList{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:10px;
    }
    .suggestionItem{
      display:grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:8px;

      cursor:pointer;
      text-align:left;
      transition: border-color .12s ease, box-shadow .12s ease, transform .06s ease, background .12s ease;
      box-shadow: var(--shadow2);

    .suggestionItem:hover{

      box-shadow: 0 10px 24px rgba(15,98,254,.08);

    }
    .suggestionItem:active{

    }
    .suggestionItem:focus-visible{
      outline:none;

    .suggestionMain{

    .suggestionMain .title{

    @keyframes pageIn{

    @keyframes panelIn{

  <div class="toasts" id="toasts"></div>

  <script>
    const STATES = ["BW","BY","BE","BB","HB","HH","HE","MV","NI","NW","RP","SL","SN","ST","SH","TH"];
    const MONTHS_DE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
    const DOW_DE = ["Mo","Di","Mi","Do","Fr","Sa","So"];
    const ALL_STATES = ["BW","BY","BE","BB","HB","HH","HE","MV","NI","NW","RP","SL","SN","ST","SH","TH"];
    const CURRENT_YEAR = new Date().getFullYear();

    const pad2 = (n) => String(n).padStart(2,"0");
    const toISO = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const fromISO = (s) => {
      const [y,m,d] = s.split("-").map(Number);
      return new Date(y, m-1, d);
    };
      const toDE = (iso) => {
      const [y,m,d] = iso.split("-");
      return `${d}.${m}.${y}`;
    };

    const fromDE = (s) => {
      const [d,m,y] = s.split(".").map(Number);
      return new Date(y, m-1, d);
    };
    const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const addDays = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
    const dayOfWeekMon0 = (d) => (d.getDay() + 6) % 7;
    const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;

    const stateSelect = document.getElementById("stateSelect");
    const yearSelect = document.getElementById("yearSelect");
    const availableDaysInput = document.getElementById("availableDays");
    const toggleHolidays = document.getElementById("toggleHolidays");
    const toggleBridge = document.getElementById("toggleBridge");
    const toggleSchool = document.getElementById("toggleSchool");

    const monthsEl = document.getElementById("months");
    const calMetaEl = document.getElementById("calMeta");
    const yearTitleEl = document.getElementById("yearTitle");

    const dashUsedEl = document.getElementById("dashUsed");
    const dashLeftEl = document.getElementById("dashLeft");
    const dashFreeEl = document.getElementById("dashFree");

    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const trashBtn = document.getElementById("trashBtn");
    const shareBtn = document.getElementById("shareBtn");

    const rangesTitleEl = document.getElementById("rangeTitle");
    const rangesEmptyEl = document.getElementById("rangesEmpty");
    const rangesTableEl = document.getElementById("rangesTable");
    const rangesBodyEl = document.getElementById("rangesBody");
    const copyRangesBtn = document.getElementById("copyRangesBtn");
    const suggestionsListEl = document.getElementById("suggestionsList");

    const toastsEl = document.getElementById("toasts");
    const tooltipLayerEl = document.getElementById("tooltipLayer");

    const STORAGE_KEY = "urlaub_multiyear_clickrange_v1";

    const toastIcon = (kind) => {
      if (kind === "copy") return `<svg viewBox="0 0 24 24"><path d="M9 9h10v10H9z"></path><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"></path></svg>`;
      if (kind === "undo") return `<svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"></path><path d="M5 10h9a5 5 0 1 1 0 10h-2"></path></svg>`;
      if (kind === "redo") return `<svg viewBox="0 0 24 24"><path d="M15 6l4 4-4 4"></path><path d="M19 10H10a5 5 0 1 0 0 10h2"></path></svg>`;
      if (kind === "trash") return `<svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 16h10l1-16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>`;
      if (kind === "toggle") return `<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"></path></svg>`;
      return `<svg viewBox="0 0 24 24"><path d="M12 6v12"></path><path d="M6 12h12"></path></svg>`;
    };

    const showToast = (message, kind = "info") => {
      const el = document.createElement("div");
      el.className = "toast";
      el.innerHTML = `<div class="icon">${toastIcon(kind)}</div><div class="msg">${message}</div>`;
      toastsEl.appendChild(el);

      const maxToasts = 3;
      while (toastsEl.children.length > maxToasts){
        toastsEl.removeChild(toastsEl.firstChild);
      }

      window.setTimeout(() => {
        el.classList.add("out");
        window.setTimeout(() => {
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 180);
      }, 2200);
    };

    let activeTooltipTarget = null;
    let tooltipBubbleEl = null;

    const hideTooltip = () => {
      activeTooltipTarget = null;
      if (!tooltipBubbleEl) return;
      tooltipBubbleEl.classList.remove("visible");
      window.setTimeout(() => {
        if (tooltipBubbleEl && !activeTooltipTarget){
          tooltipBubbleEl.remove();
          tooltipBubbleEl = null;
        }
      }, 120);
    };

    const positionTooltip = (target) => {
      if (!tooltipBubbleEl || !target) return;
      const rect = target.getBoundingClientRect();
      const bubbleRect = tooltipBubbleEl.getBoundingClientRect();
      const left = Math.min(
        window.innerWidth - bubbleRect.width - 12,
        Math.max(12, rect.left + rect.width / 2 - bubbleRect.width / 2)
      );
      let top = rect.top - bubbleRect.height - 14;
      if (top < 12) top = rect.bottom + 14;
      tooltipBubbleEl.style.left = `${left}px`;
      tooltipBubbleEl.style.top = `${top}px`;
    };

    const showTooltip = (target) => {
      const text = target && target.dataset ? target.dataset.tip : "";
      if (!text) return;
      activeTooltipTarget = target;
      if (!tooltipBubbleEl){
        tooltipBubbleEl = document.createElement("div");
        tooltipBubbleEl.className = "tooltipBubble";
        tooltipLayerEl.appendChild(tooltipBubbleEl);
      }
      tooltipBubbleEl.textContent = text;
      positionTooltip(target);
      window.requestAnimationFrame(() => {
        if (tooltipBubbleEl) tooltipBubbleEl.classList.add("visible");
      });
    };

    const stateName = (code) => {
      const opt = Array.from(stateSelect.options).find(o => o.value === code);
      return opt ? opt.textContent : code;
    };

    const normalizeRange = (a, b) => (a <= b ? { start:a, end:b } : { start:b, end:a });
    const cloneVacation = (arr) => arr.map(r => ({ start:r.start, end:r.end }));

    const mergeOverlaps = (ranges) => {
      const norm = ranges
        .map(r => normalizeRange(r.start, r.end))
        .sort((x,y) => x.start.localeCompare(y.start));

      const out = [];
      for (const r of norm){
        if (!out.length){
          out.push({ start:r.start, end:r.end });
          continue;
        }
        const last = out[out.length - 1];
        const lastEndPlus1 = toISO(addDays(fromISO(last.end), 1));
        if (r.start <= lastEndPlus1){
          if (r.end > last.end) last.end = r.end;
        } else {
          out.push({ start:r.start, end:r.end });
        }
      }
      return out;
    };

    const rangeDaysClipped = (year, startISO, endISO) => {
      const a = startOfDay(fromISO(startISO));
      const b = startOfDay(fromISO(endISO));
      const out = [];
      let cur = a <= b ? a : b;
      const end = a <= b ? b : a;
      while (cur <= end){
        if (cur.getFullYear() === year) out.push(toISO(cur));
        cur = addDays(cur, 1);
      }
      return out;
    };

    const rangesToSetClipped = (year, ranges) => {
      const s = new Set();
      for (const r of ranges){
        const nr = normalizeRange(r.start, r.end);
        for (const iso of rangeDaysClipped(year, nr.start, nr.end)) s.add(iso);
      }
      return s;
    };

    const holidayMapForState = (year, stateCode) => {
      const map = new Map();
      for (const h of getHolidayEntries(year)){
        if (h && typeof h.date === "string" && Array.isArray(h.states) && h.states.includes(stateCode)){
          map.set(h.date, h.name || "Feiertag");
        }
      }
      return map;
    };

    const easterSunday = (year) => {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31);
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month - 1, day);
    };

    const offsetHoliday = (name, year, offset, states) => ({
      name,
      date: toISO(addDays(easterSunday(year), offset)),
      states
    });

    const fixedHoliday = (name, year, month, day, states) => ({
      name,
      date: `${year}-${pad2(month)}-${pad2(day)}`,
      states
    });

    const bussUndBettag = (year) => {
      const d = new Date(year, 10, 23);
      while (d.getDay() !== 3) d.setDate(d.getDate() - 1);
      return toISO(d);
    };

    const generatedHolidayEntries = (year) => ([
      fixedHoliday("Neujahr", year, 1, 1, ALL_STATES),
      fixedHoliday("Heilige Drei Könige", year, 1, 6, ["BW","BY","ST"]),
      fixedHoliday("Internationaler Frauentag", year, 3, 8, ["BE","MV"]),
      offsetHoliday("Karfreitag", year, -2, ALL_STATES),
      offsetHoliday("Ostersonntag", year, 0, ["BB"]),
      offsetHoliday("Ostermontag", year, 1, ALL_STATES),
      fixedHoliday("Tag der Arbeit", year, 5, 1, ALL_STATES),
      offsetHoliday("Christi Himmelfahrt", year, 39, ALL_STATES),
      offsetHoliday("Pfingstsonntag", year, 49, ["BB"]),
      offsetHoliday("Pfingstmontag", year, 50, ALL_STATES),
      offsetHoliday("Fronleichnam", year, 60, ["BW","BY","HE","NW","RP","SL"]),
      fixedHoliday("Mariä Himmelfahrt", year, 8, 15, ["BY","SL"]),
      fixedHoliday("Weltkindertag", year, 9, 20, ["TH"]),
      fixedHoliday("Tag der Deutschen Einheit", year, 10, 3, ALL_STATES),
      fixedHoliday("Reformationstag", year, 10, 31, ["BB","HB","HH","MV","NI","SN","ST","SH","TH"]),
      fixedHoliday("Allerheiligen", year, 11, 1, ["BW","BY","NW","RP","SL"]),
      { name:"Buß- und Bettag", date:bussUndBettag(year), states:["SN"] },
      fixedHoliday("1. Weihnachtstag", year, 12, 25, ALL_STATES),
      fixedHoliday("2. Weihnachtstag", year, 12, 26, ALL_STATES)
    ]);

    const getHolidayEntries = (year) => {
      const merged = new Map();
      for (const entry of generatedHolidayEntries(year)){
        merged.set(`${entry.date}|${entry.name}`, entry);
      }
      const yearData = dataCache.data[String(year)];
      if (yearData && Array.isArray(yearData.holidays)){
        for (const entry of yearData.holidays){
          if (!entry || typeof entry.date !== "string" || !Array.isArray(entry.states)) continue;
          merged.set(`${entry.date}|${entry.name || "Feiertag"}`, entry);
        }
      }
      return Array.from(merged.values()).sort((a, b) => a.date.localeCompare(b.date));
    };

    const computeBridgeDays = (year, holidayMap) => {
      const bridge = new Map();

      const addBridge = (iso) => {
        const d = fromISO(iso);
        if (d.getFullYear() !== year) return;
        if (isWeekend(d)) return;
        if (holidayMap.has(iso)) return;
        bridge.set(iso, true);
      };

      for (const [iso] of holidayMap.entries()){
        const d = fromISO(iso);
        if (d.getFullYear() !== year) continue;
        const dow = dayOfWeekMon0(d);
        if (dow === 1) addBridge(toISO(addDays(d, -1)));
        if (dow === 3) addBridge(toISO(addDays(d, 1)));
      }

      return bridge;
    };

    const workingDay = (iso, holidayMap) => {
      const d = fromISO(iso);
      if (isWeekend(d)) return false;
      if (holidayMap.has(iso)) return false;
      return true;
    };

    const toSharePayload = () => {
      return {
        y: state.selectedYear,
        s: state.selectedState,
        a: state.perYear[String(state.selectedYear)] ? state.perYear[String(state.selectedYear)].available : state.available,
        u: state.ui.holidays ? 1 : 0,
        b: state.ui.bridge ? 1 : 0,
        f: state.ui.school ? 1 : 0,
        v: mergeOverlaps(state.perYear[String(state.selectedYear)] ? state.perYear[String(state.selectedYear)].vacation : state.vacation)
      };
    };

    const encodeShare = (obj) => {
      const json = JSON.stringify(obj);
      const b64 = btoa(unescape(encodeURIComponent(json)));
      return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    };

    const decodeShare = (s) => {
      const b64 = s.replace(/-/g,"+").replace(/_/g,"/");
      const pad = b64.length % 4 ? "=".repeat(4 - (b64.length % 4)) : "";
      const json = decodeURIComponent(escape(atob(b64 + pad)));
      return JSON.parse(json);
    };

    const applySharePayload = (p) => {
      if (!p || typeof p !== "object") return;
      if (!Number.isFinite(p.y)) return;
      if (!dataCache.years.includes(p.y)) return;

      state.selectedYear = p.y;
      if (typeof p.s === "string" && STATES.includes(p.s)) state.selectedState = p.s;

      state.ui.holidays = !!p.u;
      state.ui.bridge = !!p.b;
      state.ui.school = !!p.f;

      ensureYearBucket(state.selectedYear);

      if (typeof p.a === "number") state.perYear[String(state.selectedYear)].available = Math.max(0, Math.min(100, p.a));
      if (Array.isArray(p.v)) state.perYear[String(state.selectedYear)].vacation = mergeOverlaps(p.v.filter(r => r && typeof r.start === "string" && typeof r.end === "string"));
    };

    const tryLoadFromUrl = () => {
      const url = new URL(window.location.href);
      const id = url.searchParams.get("id");
      if (!id) return false;
      try{
        const payload = decodeShare(id);
        applySharePayload(payload);
        return true;
      } catch {
        return false;
      }
    };

    const state = {
      selectedState: "BE",
      selectedYear: 2026,
      available: 30,
      vacation: [],
      perYear: {},
      ui: { holidays:true, bridge:true, school:true }
    };

    const ensureYearBucket = (year) => {
      const y = String(year);
      if (!state.perYear[y]){
        state.perYear[y] = { available: state.available, vacation: [] };
      }
      state.perYear[y].vacation = mergeOverlaps(state.perYear[y].vacation);
    };

    const getCurrentYearVacation = () => {
      ensureYearBucket(state.selectedYear);
      return state.perYear[String(state.selectedYear)].vacation;
    };

    const setCurrentYearVacation = (ranges) => {
      ensureYearBucket(state.selectedYear);
      state.perYear[String(state.selectedYear)].vacation = mergeOverlaps(ranges);
    };

    const getCurrentYearAvailable = () => {
      ensureYearBucket(state.selectedYear);
      return state.perYear[String(state.selectedYear)].available;
    };

    const setCurrentYearAvailable = (n) => {
      ensureYearBucket(state.selectedYear);
      state.perYear[String(state.selectedYear)].available = n;
    };

    const undoStack = [];
    const redoStack = [];
    const HISTORY_LIMIT = 50;

    const pushHistory = () => {
      undoStack.push(cloneVacation(getCurrentYearVacation()));
      if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
      redoStack.length = 0;
      updateTopButtons();
    };

    const updateTopButtons = () => {
      undoBtn.disabled = undoStack.length === 0;
      redoBtn.disabled = redoStack.length === 0;
      trashBtn.disabled = getCurrentYearVacation().length === 0;
    };

    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    const load = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try{
        const p = JSON.parse(raw);
        if (!p || typeof p !== "object") return;
        if (typeof p.selectedState === "string" && STATES.includes(p.selectedState)) state.selectedState = p.selectedState;
        if (Number.isFinite(p.selectedYear)) state.selectedYear = p.selectedYear;
        if (p.ui && typeof p.ui === "object"){
          if (typeof p.ui.holidays === "boolean") state.ui.holidays = p.ui.holidays;
          if (typeof p.ui.bridge === "boolean") state.ui.bridge = p.ui.bridge;
          if (typeof p.ui.school === "boolean") state.ui.school = p.ui.school;
        }
        if (p.perYear && typeof p.perYear === "object"){
          state.perYear = p.perYear;
        } else {
          state.perYear = {};
        }
      } catch {}
    };

    const applyControls = () => {
      stateSelect.value = state.selectedState;
      yearSelect.value = String(state.selectedYear);
      availableDaysInput.value = String(getCurrentYearAvailable());
      toggleHolidays.checked = state.ui.holidays;
      toggleBridge.checked = state.ui.bridge;
      toggleSchool.checked = state.ui.school;
    };

    const isoToCell = new Map();
    let rangeStartISO = null;
    let hoverISO = null;

    const buildCalendar = () => {
      monthsEl.innerHTML = "";
      isoToCell.clear();

      const year = state.selectedYear;

      for (let m=0; m<12; m++){
        const month = document.createElement("section");
        month.className = "month";

        const top = document.createElement("div");
        top.className = "monthTop";
        top.innerHTML = `<div class="name">${MONTHS_DE[m]}</div><div class="hintSmall" id="mh-${m}">—</div>`;
        month.appendChild(top);

        const dow = document.createElement("div");
        dow.className = "dow";
        for (const x of DOW_DE){
          const el = document.createElement("div");
          el.textContent = x;
          dow.appendChild(el);
        }
        month.appendChild(dow);

        const grid = document.createElement("div");
        grid.className = "grid";

        const first = new Date(year, m, 1);
        const offset = dayOfWeekMon0(first);

        for (let i=0; i<offset; i++){
          const c = document.createElement("div");
          c.className = "cell muted";
          c.innerHTML = `<div class="d"></div>`;
          grid.appendChild(c);
        }

        const lastDay = new Date(year, m+1, 0).getDate();
        for (let day=1; day<=lastDay; day++){
          const d = new Date(year, m, day);
          const iso = toISO(d);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.iso = iso;

          const dn = document.createElement("div");
          dn.className = "d";
          dn.textContent = String(day);
          cell.appendChild(dn);

          grid.appendChild(cell);
          isoToCell.set(iso, cell);
        }

        month.appendChild(grid);
        monthsEl.appendChild(month);
      }

      attachCellEvents();
    };

    const attachCellEvents = () => {
      for (const [iso, cell] of isoToCell.entries()){
        cell.addEventListener("mouseenter", () => {
          hoverISO = iso;
          if (rangeStartISO) updateDecorations();
        });
        cell.addEventListener("mouseleave", () => {
          hoverISO = null;
          if (rangeStartISO) updateDecorations();
        });

        cell.addEventListener("click", () => {
          if (!rangeStartISO){
            rangeStartISO = iso;
            hoverISO = iso;
            updateDecorations();
            return;
          }

          const r = normalizeRange(rangeStartISO, iso);
          pushHistory();
          const v = getCurrentYearVacation().slice();
          v.push(r);
          setCurrentYearVacation(v);

          rangeStartISO = null;
          hoverISO = null;

          save();
          updateAll();
          showToast("Zeitraum hinzugefügt", "toggle");
        });
      }

      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape"){
          if (rangeStartISO){
            rangeStartISO = null;
            hoverISO = null;
            updateAll();
            showToast("Auswahl abgebrochen", "info");
          }
        }
      });
    };

    const clearCell = (cell) => {
      cell.classList.remove("weekend","holiday","bridge","vac","preview","school");
    };

    const monthHint = (m, holidayMap, bridgeMap, schoolSet) => {
      const year = state.selectedYear;
      const first = new Date(year, m, 1);
      const last = new Date(year, m+1, 0);
      let h=0,b=0,f=0;

      for (let d = startOfDay(first); d <= last; d = addDays(d,1)){
        const iso = toISO(d);
        if (holidayMap.has(iso)) h++;
        if (bridgeMap.has(iso)) b++;
        if (schoolSet.has(iso)) f++;
      }

      const parts = [];
      if (state.ui.holidays && toggleHolidays.checked && h) parts.push(`${h} F`);
      if (state.ui.bridge && toggleBridge.checked && b) parts.push(`${b} B`);
      if (state.ui.school && toggleSchool.checked && f) parts.push(`${f} S`);
      return parts.length ? parts.join(" · ") : "—";
    };

    const getSchoolRanges = (year, stateCode) => {
      const yearData = dataCache.data[String(year)];
      if (!yearData || !yearData.school || typeof yearData.school !== "object") return [];
      const arr = yearData.school[stateCode];
      return Array.isArray(arr) ? arr : [];
    };

    const isRangeCovered = (range, coveredSet, year) => {
      const days = rangeDaysClipped(year, range.start, range.end);
      if (!days.length) return false;
      return days.every((day) => coveredSet.has(day));
    };

    const hasSchoolDataForState = (year, stateCode) => getSchoolRanges(year, stateCode).length > 0;

    const bestWindows = (year, holidayMap) => {
      const limit = Math.max(3, Math.min(8, getCurrentYearAvailable() || 0));
      const endOfYear = new Date(year, 11, 31);
      const picks = [];
      for (let start = new Date(year, 0, 1); start <= endOfYear; start = addDays(start, 1)){
        let used = 0;
        for (let end = start; end <= endOfYear; end = addDays(end, 1)){
          const iso = toISO(end);
          if (workingDay(iso, holidayMap)) used++;
          if (used > limit) break;
          const total = Math.round((end - start) / 86400000) + 1;
          if (total < 4 || used === 0) continue;
          picks.push({
            start: toISO(start),
            end: iso,
            used,
            total,
            score: total * 8 - used * 5
          });
        }
      }

      picks.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.total !== a.total) return b.total - a.total;
        if (a.used !== b.used) return a.used - b.used;
        return a.start.localeCompare(b.start);
      });

      const out = [];
      for (const pick of picks){
        if (out.some((entry) => !(pick.end < entry.start || pick.start > entry.end))) continue;
        out.push(pick);
        if (out.length === 4) break;
      }
      return out;
    };

    const syncSchoolToggle = () => {
      const schoolAvailable = hasSchoolDataForState(state.selectedYear, state.selectedState);
      toggleSchool.disabled = !schoolAvailable;
      if (!schoolAvailable){
        toggleSchool.checked = false;
        state.ui.school = false;
        return;
      }
      if (state.ui.school) toggleSchool.checked = true;
    };

    const updateDecorations = () => {
      const year = state.selectedYear;

      const holidayMap = holidayMapForState(year, state.selectedState);
      const bridgeMap = computeBridgeDays(year, holidayMap);

      const vacMerged = mergeOverlaps(getCurrentYearVacation());
      const vacSet = rangesToSetClipped(year, vacMerged);

      const schoolAutoRanges = getSchoolRanges(year, state.selectedState);
      const schoolSet = (state.ui.school && toggleSchool.checked)
        ? rangesToSetClipped(year, mergeOverlaps(schoolAutoRanges))
        : new Set();

      let previewSet = new Set();
      if (rangeStartISO && hoverISO){
        const pr = normalizeRange(rangeStartISO, hoverISO);
        previewSet = new Set(rangeDaysClipped(year, pr.start, pr.end));
      }

      for (let m=0; m<12; m++){
        const el = document.getElementById(`mh-${m}`);
        if (el) el.textContent = monthHint(m, holidayMap, bridgeMap, schoolSet);
      }

      for (const [iso, cell] of isoToCell.entries()){
        clearCell(cell);

        const d = fromISO(iso);
        if (isWeekend(d)) cell.classList.add("weekend");

        if (state.ui.holidays && toggleHolidays.checked && holidayMap.has(iso)){
          cell.classList.add("holiday");
        }

        if (state.ui.bridge && toggleBridge.checked && bridgeMap.has(iso)){
          cell.classList.add("bridge");
        }

        if (schoolSet.has(iso)){
          cell.classList.add("school");
        }

        if (vacSet.has(iso)){
          cell.classList.add("vac");
        }

        if (previewSet.has(iso)){
          cell.classList.add("preview");
        }
      }

      const metaParts = [];
      metaParts.push(`Bundesland: ${stateName(state.selectedState)}`);
      if (rangeStartISO){
        metaParts.push(`Auswahl läuft: ${toDE(rangeStartISO)} → ${toDE(hoverISO)} (ESC abbrechen)`);
      }
      calMetaEl.textContent = metaParts.join(" · ");
    };

    const updateDashboard = () => {
      const year = state.selectedYear;
      const holidayMap = holidayMapForState(year, state.selectedState);

      const vacMerged = mergeOverlaps(getCurrentYearVacation());
      const vacSet = rangesToSetClipped(year, vacMerged);

      let used = 0;
      for (const iso of vacSet){
        if (workingDay(iso, holidayMap)) used++;
      }

      const avail = getCurrentYearAvailable();
      const left = avail - used;
      const free = vacSet.size;

      dashUsedEl.textContent = String(used);
      dashLeftEl.textContent = String(left);
      dashFreeEl.textContent = String(free);

      dashLeftEl.classList.toggle("neg", left < 0);

      if (!rangeStartISO){
        const parts = [];
        parts.push(`Bundesland: ${stateName(state.selectedState)}`);
        parts.push(`Gesetzt: ${used} · Rest: ${left} · Freie Tage: ${free}`);
        calMetaEl.textContent = parts.join(" · ");
      }
    };

    const updateRangesList = () => {
      const year = state.selectedYear;
      const merged = mergeOverlaps(getCurrentYearVacation());
      rangesTitleEl.textContent = `Zeiträume (${merged.length})`;

      if (merged.length === 0){
        rangesEmptyEl.style.display = "block";
        rangesTableEl.style.display = "none";
        rangesBodyEl.innerHTML = "";
        copyRangesBtn.disabled = true;
        return;
      }

      rangesEmptyEl.style.display = "none";
      rangesTableEl.style.display = "table";
      copyRangesBtn.disabled = false;

      rangesBodyEl.innerHTML = "";
      for (let i=0; i<merged.length; i++){
        const r = merged[i];
        const days = rangeDaysClipped(year, r.start, r.end).length;
        const tr = document.createElement("tr");
        tr.innerHTML = `<tr><td>${i+1}</td><td>${toDE(r.start)}</td><td>${toDE(r.end)}</td><td>${days}</td><td class="rowTrashCell"><button class="rowTrashBtn tip" type="button" aria-label="Diesen Zeitraum löschen" data-tip="Diesen Zeitraum löschen" data-index="${i}"><svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 16h10l1-16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></button></td>`;
        rangesBodyEl.appendChild(tr);
      }
    };

    const updateSuggestions = () => {
      const year = state.selectedYear;
      const holidayMap = holidayMapForState(year, state.selectedState);
      const coveredSet = rangesToSetClipped(year, mergeOverlaps(getCurrentYearVacation()));
      const picks = bestWindows(year, holidayMap)
        .filter((pick) => !isRangeCovered(pick, coveredSet, year));

      if (!picks.length){
        suggestionsListEl.innerHTML = `<div class="empty">Keine offenen Vorschläge.</div>`;
        return;
      }

      suggestionsListEl.innerHTML = picks.map((pick) => {
        return `
          <button class="suggestionItem" type="button" data-start="${pick.start}" data-end="${pick.end}">
            <div class="suggestionMain">
              <div class="title">${toDE(pick.start)} - ${toDE(pick.end)}</div>
              <div class="meta">${pick.used} Urlaubstage</div>
              <div class="suggestionCta">Einsetzen</div>
            </div>
            <div class="suggestionStat">
              <div class="free">${pick.total}</div>
              <div class="used">freie Tage</div>
            </div>
          </button>
        `;
      }).join("");
    };

    suggestionsListEl.addEventListener("click", (ev) => {
      const btn = ev.target.closest(".suggestionItem");
      if (!btn) return;
      const start = btn.dataset.start;
      const end = btn.dataset.end;
      if (!start || !end) return;

      pushHistory();
      const next = getCurrentYearVacation().slice();
      next.push(normalizeRange(start, end));
      setCurrentYearVacation(next);
      rangeStartISO = null;
      hoverISO = null;
      save();
      updateAll();
      showToast(`Vorschlag gesetzt`, "toggle");
    });

    document.addEventListener("mouseover", (ev) => {
      const target = ev.target.closest("[data-tip]");
      if (!target) return;
      showTooltip(target);
    });

    document.addEventListener("mouseout", (ev) => {
      const target = ev.target.closest("[data-tip]");
      if (!target) return;
      if (target.contains(ev.relatedTarget)) return;
      hideTooltip();
    });

    document.addEventListener("focusin", (ev) => {
      const target = ev.target.closest("[data-tip]");
      if (!target) return;
      showTooltip(target);
    });

    document.addEventListener("focusout", (ev) => {
      const target = ev.target.closest("[data-tip]");
      if (!target) return;
      hideTooltip();
    });

    window.addEventListener("scroll", () => {
      if (activeTooltipTarget) positionTooltip(activeTooltipTarget);
    }, { passive:true });

    window.addEventListener("resize", () => {
      if (activeTooltipTarget) positionTooltip(activeTooltipTarget);
    });

    const rangesTextForClipboard = () => {
      const year = state.selectedYear;
      const merged = mergeOverlaps(getCurrentYearVacation());
      if (!merged.length) return "";
      const lines = [];
      for (let i=0; i<merged.length; i++){
        const r = merged[i];
        const days = rangeDaysClipped(year, r.start, r.end).length;
        lines.push(`${i+1}. ${toDE(r.start)} - ${toDE(r.end)} (${days} Tage)`);
      }
      return lines.join("\n");
    };

    const updateShareLink = () => {
      const url = new URL(window.location.href);
      url.searchParams.delete("serverwindowid");
      url.searchParams.set("id", encodeShare(toSharePayload()));
      return url.toString();
    };

    const updateYearTitle = () => {
      yearTitleEl.textContent = String(state.selectedYear);
    };

    const updateAll = () => {
      state.selectedState = stateSelect.value;
      if (!yearSelect.disabled && yearSelect.value){
        state.selectedYear = Number(yearSelect.value);
      }

      ensureYearBucket(state.selectedYear);

      state.ui.holidays = !!toggleHolidays.checked;
      state.ui.bridge = !!toggleBridge.checked;
      state.ui.school = !!toggleSchool.checked;
      syncSchoolToggle();

      save();
      updateYearTitle();
      updateDecorations();
      updateDashboard();
      updateTopButtons();
      updateRangesList();
      updateSuggestions();
      updateShareLink();
    };

    copyRangesBtn.addEventListener("click", async () => {
      const txt = rangesTextForClipboard();
      if (!txt) return;
      let ok = false;
      try{
        await navigator.clipboard.writeText(txt);
        ok = true;
      } catch {
        const ta = document.createElement("textarea");
        ta.value = txt;
        document.body.appendChild(ta);
        ta.select();
        try{ ok = document.execCommand("copy"); } catch {}
        document.body.removeChild(ta);
      }
      if (ok) showToast("Liste kopiert", "copy");
    });

    shareBtn.addEventListener("click", async () => {
      const url = updateShareLink();
      let ok = false;
      try{
        await navigator.clipboard.writeText(url);
        ok = true;
      } catch {}
      if (ok) showToast("Link kopiert", "copy");
    });

    rangesBodyEl.addEventListener("click", (ev) => {
      const btn = ev.target.closest(".rowTrashBtn");
      if (!btn) return;
      const idx = Number(btn.dataset.index);
      const merged = mergeOverlaps(getCurrentYearVacation());
      if (!Number.isFinite(idx) || idx < 0 || idx >= merged.length) return;

      pushHistory();
      merged.splice(idx, 1);
      setCurrentYearVacation(merged);
      rangeStartISO = null;
      hoverISO = null;
      save();
      updateAll();
      showToast("Zeitraum gelöscht", "trash");
    });

    undoBtn.addEventListener("click", () => {
      if (!undoStack.length) return;
      redoStack.push(cloneVacation(getCurrentYearVacation()));
      setCurrentYearVacation(undoStack.pop());
      rangeStartISO = null;
      hoverISO = null;
      save();
      updateAll();
      showToast("Undo", "undo");
    });

    redoBtn.addEventListener("click", () => {
      if (!redoStack.length) return;
      undoStack.push(cloneVacation(getCurrentYearVacation()));
      setCurrentYearVacation(redoStack.pop());
      rangeStartISO = null;
      hoverISO = null;
      save();
      updateAll();
      showToast("Redo", "redo");
    });

    trashBtn.addEventListener("click", () => {
      if (!getCurrentYearVacation().length) return;
      pushHistory();
      setCurrentYearVacation([]);
      rangeStartISO = null;
      hoverISO = null;
      save();
      updateAll();
      showToast("Auswahl gelöscht", "trash");
    });

    const onToggleToast = (label, enabled) => {
      showToast(`${label} ${enabled ? "aktiviert" : "deaktiviert"}`, "toggle");
    };

    stateSelect.addEventListener("change", () => {
      rangeStartISO = null;
      hoverISO = null;
      undoStack.length = 0;
      redoStack.length = 0;
      const beforeYear = state.selectedYear;
      state.selectedState = stateSelect.value;
      populateYearSelect();
      if (state.selectedYear !== beforeYear){
        ensureYearBucket(state.selectedYear);
        availableDaysInput.value = String(getCurrentYearAvailable());
        buildCalendar();
        updateTopButtons();
      }
      updateAll();
      showToast(`Bundesland: ${stateName(state.selectedState)}`, "toggle");
    });

    yearSelect.addEventListener("change", () => {
      if (yearSelect.disabled || !yearSelect.value) return;
      rangeStartISO = null;
      hoverISO = null;
      undoStack.length = 0;
      redoStack.length = 0;

      state.selectedYear = Number(yearSelect.value);
      ensureYearBucket(state.selectedYear);
      availableDaysInput.value = String(getCurrentYearAvailable());

      buildCalendar();
      updateTopButtons();
      updateAll();

      showToast(`Jahr: ${state.selectedYear}`, "toggle");
    });

    availableDaysInput.addEventListener("input", () => {
      const n = Math.max(0, Math.min(100, Number(availableDaysInput.value || 0)));
      setCurrentYearAvailable(n);
      save();
      updateAll();
    });

    toggleHolidays.addEventListener("change", () => {
      updateAll();
      onToggleToast("Feiertage", toggleHolidays.checked);
    });

    toggleBridge.addEventListener("change", () => {
      updateAll();
      onToggleToast("Brückentage", toggleBridge.checked);
    });

    toggleSchool.addEventListener("change", () => {
      updateAll();
      onToggleToast("Schulferien", toggleSchool.checked);
    });

    const availableYearsForState = (stateCode) => dataCache.years.filter((year) => hasSchoolDataForState(year, stateCode));

    const populateYearSelect = () => {
      const years = availableYearsForState(state.selectedState);
      yearSelect.innerHTML = "";
      if (!years.length){
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "Keine Ferien";
        yearSelect.appendChild(opt);
        yearSelect.disabled = true;
        return years;
      }
      yearSelect.disabled = false;
      if (!years.includes(state.selectedYear)){
        state.selectedYear = years[0];
      }
      for (const y of years){
        const opt = document.createElement("option");
        opt.value = String(y);
        opt.textContent = String(y);
        yearSelect.appendChild(opt);
      }
      yearSelect.value = String(state.selectedYear);
      return years;
    };

    const dataCache = { years: [], states: [], data: {} };

    const buildDynamicYears = (existingYears) => {
      const years = new Set(existingYears);
      for (let year = CURRENT_YEAR - 1; year <= CURRENT_YEAR + 9; year++){
        years.add(year);
      }
      if (Number.isFinite(state.selectedYear)) years.add(state.selectedYear);
      return Array.from(years).sort((a, b) => a - b);
    };

    const loadDataJson = async () => {
      const res = await fetch("./data.json", { cache: "no-cache" });
      if (!res.ok) throw new Error("data.json konnte nicht geladen werden");
      const json = await res.json();
      const sourceYears = Array.isArray(json.years) ? json.years.filter(n => Number.isFinite(n)) : [];
      dataCache.states = Array.isArray(json.states) ? json.states : [];
      dataCache.data = (json.data && typeof json.data === "object") ? json.data : {};
      dataCache.years = buildDynamicYears(sourceYears);
      if (!dataCache.states.length) dataCache.states = STATES.slice();
    };

    const init = async () => {
      await loadDataJson();

      load();

      populateYearSelect();

      const fromUrl = tryLoadFromUrl();
      if (fromUrl){
        populateYearSelect();
        save();
      }

      ensureYearBucket(state.selectedYear);

      applyControls();
      buildCalendar();
      updateTopButtons();
      updateAll();
    };

    init();
  </script>
</body>
</html>
